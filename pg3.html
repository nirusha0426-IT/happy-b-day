<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* 💜 YOUR WALLPAPER */
    background-image: url("images/p4.jpeg");
    background-size: cover;              /* fills screen */
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* Optional dark overlay for readability */
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* 🎥 VIDEO */
video {
    width: 300px;
    max-width: 90%;
    border-radius: 20px;
    border: 5px solid white;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* 💬 MESSAGE */
.message {
    margin-top: 30px;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 10px #000;
    max-width: 600px;
}
</style>
</head>

<body>

<!-- 🎥 YOUR VIDEO -->
<video src="images/mr bean.mp4" controls autoplay loop></video>

<!-- 💬 MESSAGE -->
<div class="message">
    ONLY YES AHH ? 😏<br><br>
    THEN THIS IS HOW I'M GONNA CELEBRATE UR DAY !! 🎉💜<br><br>
    JUST GO BACK TO SAY UH LOVED IT 😉
</div>

</body>
</html>

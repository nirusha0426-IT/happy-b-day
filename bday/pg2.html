<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💜</title>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Arial', sans-serif;
            color: white; text-align: center;
            background-image: url("images/happybday.jpeg");
            background-repeat: repeat; background-size: 300px; 
            background-attachment: fixed; background-color: #5d103d;
            overflow: hidden; 
        }

        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(60, 10, 40, 0.98); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 30px; z-index: 9999;
            transition: opacity 1s ease-in-out; pointer-events: none;
        }

        .surprise-text-pop {
            font-size: clamp(50px, 12vw, 90px); font-weight: bold;
            color: #fff; text-shadow: 0 0 20px #ff00ff, 0 0 40px #ffd700;
            opacity: 0; animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .intro-img {
            width: 300px; border-radius: 20px; border: 6px solid #ffd700;
            opacity: 0; animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.2s forwards;
        }

        @keyframes popIn { 
            0% { transform: scale(0); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }

        .side-slide { position: fixed; top: 0; width: 250px; height: 100vh; overflow: hidden; z-index: 5; }
        .left-slide { left: 0; }
        .right-slide { right: 0; }

        .photo-track-v { display: flex; flex-direction: column; gap: 20px; position: absolute; width: 100%; align-items: center; }
        .photo-track-v img { width: 220px; height: 320px; object-fit: cover; border-radius: 15px; border: 4px solid white; }

        .track-up { animation: scrollUp 25s linear infinite; }
        .track-down { animation: scrollDown 25s linear infinite; }

        @keyframes scrollUp { 0% { top: 0; } 100% { top: -2040px; } }
        @keyframes scrollDown { 0% { top: -2040px; } 100% { top: 0; } }

        .container { 
            position: relative; z-index: 10; padding: 20px;
            background: rgba(0, 0, 0, 0.7); min-height: 100vh;
            margin: 0 260px; display: flex; flex-direction: column; align-items: center;
        }

        .middle-strip-viewport { width: 100%; max-width: 800px; overflow: hidden; position: relative; margin: 20px 0; }
        #middleStripH { display: flex; flex-direction: row; gap: 20px; position: relative; width: max-content; }

        .middle-item { width: 250px; height: 400px; object-fit: cover; border-radius: 15px; border: 4px solid white; flex-shrink: 0; }

        .controls { margin-top: 10px; display: flex; gap: 20px; }
        
        .arrow-btn { 
            background: white; border: none; border-radius: 50%; 
            width: 60px; height: 60px; font-size: 30px; cursor: pointer; 
            color: #5d103d; display: flex; align-items: center; justify-content: center;
        }

        .choice-btn {
            background: white; border: none; border-radius: 10px;
            padding: 10px 25px; font-size: 18px; font-weight: bold;
            cursor: pointer; color: #5d103d; transition: 0.3s;
        }

        .choice-btn:hover { 
            transform: scale(1.1); 
            background: #ff00ff; 
            color: white; 
        }

        .sparkle { position: absolute; width: 12px; height: 12px; border-radius: 50%; z-index: 10000; }

        h1 { 
            font-size: 40px; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 10px #ff00ff; 
        }
    </style>
</head>

<body>

    <div id="intro-overlay">
        <div class="surprise-text-pop">SURPRISE!</div>
        <img src="images/confetti1.jpeg" class="intro-img">
    </div>

    <div class="side-slide left-slide">
        <div class="photo-track-v track-up">
            <img src="images/L.jpg"> <img src="images/L0.jpg"> <img src="images/L1.jpeg">
            <img src="images/L2.jpeg"> <img src="images/L3.jpeg"> <img src="images/L4.jpg">
            <img src="images/L.jpg"> <img src="images/L0.jpg"> <img src="images/L1.jpeg">
        </div>
    </div>

    <div class="side-slide right-slide">
        <div class="photo-track-v track-down">
            <img src="images/R.jpeg"> <img src="images/R0.jpeg"> <img src="images/R1.jpeg">
            <img src="images/R2.jpeg"> <img src="images/R3.jpg"> <img src="images/R4.jpg">
            <img src="images/R.jpeg"> <img src="images/R0.jpeg"> <img src="images/R1.jpeg">
        </div>
    </div>

    <div class="container">
        <h1>NA BANGARAM PUTTINROJU !!</h1>
        
        <div class="middle-strip-viewport">
            <div id="middleStripH">
                <img src="images/m.jpeg" class="middle-item">
                <img src="images/m0.jpeg" class="middle-item">
                <img src="images/m1.jpeg" class="middle-item">
                <img src="images/m2.jpg" class="middle-item">
                <img src="images/m3.jpeg" class="middle-item">
                <video src="images/m4.mp4" class="middle-item" controls loop muted></video>
                <img src="images/m.jpeg" class="middle-item">
                <img src="images/m0.jpeg" class="middle-item">
            </div>
        </div>

        <div class="controls">
            <button class="arrow-btn" onclick="moveStrip('left')">⬅</button>
            <button class="arrow-btn" onclick="moveStrip('right')">➡</button>
        </div>

        <h2 style="margin-top: 40px; text-shadow: 2px 2px 8px #ff00ff;">Like it?</h2>
        
        <!-- ✅ FIXED BUTTONS -->
        <div style="display: flex; gap: 20px; margin-top: 10px;">
            <button class="choice-btn" onclick="goYes()">Yes</button>
            <button class="choice-btn" onclick="goLoved()">Loved it</button>
        </div>

        <p style="margin-top: 30px; opacity: 0.6;">TO : Y TEJASWI FROM : A BTS FAN</p>
    </div>

    <script>
        window.onload = function() {
            const overlay = document.getElementById('intro-overlay');
            const colors = ['#FFD700', '#FF00FF', '#FFFFFF', '#00FFFF'];

            for (let i = 0; i < 80; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                overlay.appendChild(sparkle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 250 + Math.random() * 400;

                sparkle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1, top: '50%', left: '50%' },
                    { transform: `translate(${Math.cos(angle)*velocity}px, ${Math.sin(angle)*velocity}px) scale(0)`, opacity: 0 }
                ], { duration: 2000, easing: 'ease-out', fill: 'forwards' });
            }

            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => { 
                    overlay.remove(); 
                    document.body.style.overflow = 'auto'; 
                }, 1000);
            }, 5500);
        };

        let currentIndex = 0;
        const strip = document.getElementById('middleStripH');
        const step = 270; 
        const totalOriginalItems = 6; 

        function moveStrip(direction) {
            strip.style.transition = "transform 0.6s ease-in-out";
            if (direction === 'right') { currentIndex++; } 
            else { currentIndex--; }

            strip.style.transform = `translateX(${-currentIndex * step}px)`;

            setTimeout(() => {
                if (currentIndex >= totalOriginalItems) {
                    strip.style.transition = "none"; 
                    currentIndex = 0;
                    strip.style.transform = `translateX(0px)`;
                }
                if (currentIndex < 0) {
                    strip.style.transition = "none"; 
                    currentIndex = totalOriginalItems - 1;
                    strip.style.transform = `translateX(${-currentIndex * step}px)`;
                }
            }, 600);
        }

        /* ✅ REDIRECTION FUNCTIONS */
        function goYes() {
            window.location.href = "pg3.html";
        }

        function goLoved() {
            window.location.href = "pg4.html";
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💜</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            /* Updated to use your black balloon wallpaper */
            background-image: url("images/p.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Added an overlay so the text is easier to read against the dark background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Darkens the image slightly */
            z-index: -1;
        }

        /* 🖼️ IMAGE */
        img {
            width: 250px;
            border-radius: 20px;
            border: 5px solid white;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 💬 TEXT */
        h1 {
            font-size: 35px;
            text-shadow: 2px 2px 10px #000;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        /* 🎵 AUDIO */
        .audio-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1); /* Subtle box for audios */
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>

    <img src="images/a.jpeg">

    <h1>ONCE AGAIN HAPPIEEE B'DAY CHONGAAA 💜🎉</h1>

    <div class="audio-box">
        <audio controls>
            <source src="images/A1.mp3" type="audio/mp3">
        </audio>

        <audio controls>
            <source src="images/A2.mp4" type="audio/mp4">
        </audio>
    </div>

</body>
</html>
